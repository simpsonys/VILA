name: Build and Deploy Tauri to VILA_Release

on:
  push:
    branches:
      - main
      - feature/tauri-migration
      - tauri

env:
  RELEASE_REPO: simpsonys/VILA_Release

jobs:
  build_and_release:
    name: Build (Windows) and Publish to Release Repo
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        run: npm run tauri build

      - name: Checkout Release Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ secrets.RELEASE_PAT }}
          path: release_repo
          ref: ${{ github.ref_name }} # Try to checkout the same branch if it exists

      - name: Commit and Push Binaries
        shell: pwsh
        run: |
          cd release_repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Ensure we are on the same branch as the source repo
          if (git ls-remote --heads origin ${{ github.ref_name }} | Select-String -Quiet "${{ github.ref_name }}") {
              git checkout ${{ github.ref_name }}
          } else {
              git checkout -b ${{ github.ref_name }}
          }

          # Copy built binaries (exe and MSI) to release repo
          Copy-Item -Path "..\src-tauri\target\release\bundle\nsis\*.exe" -Destination "Voice-Log-Analyzer-Setup.exe" -Force
          Copy-Item -Path "..\src-tauri\target\release\app.exe" -Destination "Voice-Log-Analyzer-Portable.exe" -Force

          git add .
          git commit -m "Automated build from VILA ${{ github.sha }}"
          git push -u origin ${{ github.ref_name }}